name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Python compile
        run: python -m compileall dags src scripts streamlit_app
      - name: SQL files present
        run: test -f sql/001_create_schemas.sql && test -f sql/002_create_warehouse_tables.sql
